name: CodeQL Advanced

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  schedule:
    - cron: "24 15 * * 6"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET 8
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@256d634097be96e792d6764f9edaefc4320557b1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Restore and build
        if: matrix.language == 'csharp'
        run: |
          dotnet restore src/KeelMatrix.Redaction/KeelMatrix.Redaction.csproj
          dotnet build src/KeelMatrix.Redaction/KeelMatrix.Redaction.csproj --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@256d634097be96e792d6764f9edaefc4320557b1
        with:
          category: /language:${{ matrix.language }}
